name: Mirror main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    name: Push main to mirror repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push main to mirror
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          if [[ -z "$MIRROR_TOKEN" ]]; then
            echo "MIRROR_TOKEN is not set"
            exit 1
          fi

          git remote add mirror "https://x-access-token:${MIRROR_TOKEN}@github.com/adisak-coder/IELTS-LMS.git"
          git push mirror main:main
